<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Payments</title>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            display: block;
            width: 100%;
            height: 100vh;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            border-top-color: #10b981;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Content Overlay */
        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            width: 100%;
            padding: 0 20px;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.8) 0%, transparent 70%);
            filter: blur(40px);
            opacity: 0.6;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .main-logo {
            width: clamp(300px, 45vw, 900px);
            height: auto;
            display: block;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 40px rgba(16, 185, 129, 0.5));
            animation: logoFloat 4s ease-in-out infinite;
        }

        @keyframes logoFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(0.8);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .tagline {
            font-size: clamp(0.9rem, 2vw, 1.3rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
            animation: fadeInUp 1s ease-out;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            pointer-events: auto;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .glass-button {
            position: relative;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #fff;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
            border: none;
            border-radius: 50px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .glass-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.7s ease;
        }

        .glass-button:hover {
            transform: translateY(-5px) scale(1.05);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(33, 179, 221, 0.2) 100%);
            box-shadow: 0 20px 50px rgba(16, 185, 129, 0.4),
                0 0 0 2px rgba(16, 185, 129, 0.3),
                inset 0 1px 2px rgba(255, 255, 255, 0.3);
        }

        .glass-button:hover::before {
            left: 100%;
        }

        .glass-button:active {
            transform: translateY(0) scale(0.98);
        }

        /* Stats Counter */
        .stats {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            display: flex;
            gap: 30px;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInLeft 1s ease-out 0.6s both;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.1em;
        }

        /* GUI Customization */
        .lil-gui {
            --background: rgba(20, 20, 30, 0.8);
            --text-light: #fff;
            --input-background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lil-gui.root {
            position: fixed;
            bottom: 20px;
            right: 20px;
            top: auto !important;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
        }

        #fileInput {
            display: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .buttons {
                flex-direction: column;
                gap: 16px;
                padding: 0 40px;
            }

            .stats {
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 10px 20px;
            }

            .stat-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
    </div>

    <input type="file" id="fileInput" accept="image/png, image/jpeg">

    <div class="content">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <img class="main-logo" src="https://playpayments.online/images/playpayments-logo-top.webp"
                alt="PlayPayments Logo">
        </div>
        <p class="tagline">O Futuro da Liquidez Financeira</p>
        <div class="buttons">
            <a href="https://playpayments.online/auth/login" class="glass-button" id="discoverBtn"
                style="text-decoration: none;">
                <span>Entrar</span>
            </a>
            <a href="https://playpayments.online/auth/register" class="glass-button" id="joinBtn"
                style="text-decoration: none;">
                <span>Cadastre-se</span>
            </a>
        </div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="statTransactions">2.4M</div>
            <div class="stat-label">Transações</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statVolume">$1.2B</div>
            <div class="stat-label">Volume</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statUsers">50K+</div>
            <div class="stat-label">Usuários</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { gsap } from 'gsap';
        import GUI from 'lil-gui';

        // --- CONFIGURAÇÕES AVANÇADAS ---
        const CONFIG = {
            canvasPadding: 200,
            resolutionScale: 4,
            particleCount: 2000,
            shadowQuality: 2
        };

        // --- CONFIGURAÇÃO DAS CAMADAS OTIMIZADA ---
        const layersConfig = [
            { type: 'bg', w: 1920, h: 1080, col: '#0a0a0f', x: 0, y: 0, z: -20, s: 1.3, op: 1 },
            { type: 'sidebar', w: 320, h: 1200, col: '#12121a', x: -22, y: 0, z: -5, s: 1, op: 0.98 },
            { type: 'header', w: 1600, h: 140, col: '#12121a', x: 2, y: 9, z: 0, s: 1, op: 1 },
            { type: 'chart', w: 1100, h: 550, col: '#1a1a24', x: -2, y: 1, z: 5, s: 1, op: 1 },
            { type: 'cards', w: 450, h: 280, col: '#2a2a38', x: 16, y: 1.5, z: 10, s: 1, op: 1 },
            { type: 'cards', w: 450, h: 280, col: '#2a2a38', x: 16, y: -4.8, z: 10, s: 1, op: 1 },
            { type: 'table', w: 1100, h: 450, col: '#1a1a24', x: -2, y: -9, z: 5, s: 1, op: 1 },
            { type: 'circle-btn', w: 120, h: 120, col: '#10b981', x: 23, y: -6.5, z: 25, s: 1, op: 1 },
            { type: 'chart', w: 700, h: 450, col: '#0f0f15', x: 0, y: 0, z: 35, s: 0.9, op: 0.96 },
            { type: 'notification', w: 320, h: 110, col: '#ef4444', x: 24, y: 8.5, z: 32, s: 0.8, op: 0.97 },
            { type: 'metric', w: 280, h: 280, col: '#10b981', x: -18, y: -5, z: 15, s: 0.8, op: 0.95 }
        ];

        const shadowConfig = { color: '#000000', blur: 150, opacity: 0.35, x: 8, y: 25 };
        const renderConfig = { borderRadius: 24, glowIntensity: 0.5 };

        // --- SISTEMA DE PARTÍCULAS ---
        function createParticleSystem() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.particleCount * 3);
            const colors = new Float32Array(CONFIG.particleCount * 3);

            for (let i = 0; i < CONFIG.particleCount; i++) {
                const r = Math.random() * 200;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                positions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
                positions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r;
                positions[i * 3 + 2] = Math.cos(phi) * r;

                const color = new THREE.Color().setHSL(0.6 + Math.random() * 0.3, 0.8, 0.5);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            return new THREE.Points(geometry, material);
        }

        // --- GERADOR DE TEXTURA OTIMIZADO ---
        function createUIElement(config, shadowConfig, index, radius, customImage = null) {
            const realW = config.w;
            const realH = config.h;

            const canvas = document.createElement('canvas');
            canvas.width = (realW + CONFIG.canvasPadding * 2) * CONFIG.resolutionScale;
            canvas.height = (realH + CONFIG.canvasPadding * 2) * CONFIG.resolutionScale;

            const ctx = canvas.getContext('2d');
            ctx.scale(CONFIG.resolutionScale, CONFIG.resolutionScale);

            const x = CONFIG.canvasPadding;
            const y = CONFIG.canvasPadding;
            const isCircle = config.type === 'circle-btn';
            const effectiveRadius = isCircle ? realW / 2 : radius;

            // Clear
            ctx.clearRect(0, 0, canvas.width / CONFIG.resolutionScale, canvas.height / CONFIG.resolutionScale);

            // Shadow
            ctx.save();
            ctx.beginPath();
            if (isCircle) {
                ctx.arc(x + realW / 2, y + realH / 2, effectiveRadius, 0, Math.PI * 2);
            } else {
                roundRect(ctx, x, y, realW, realH, effectiveRadius);
            }

            const shadowColor = new THREE.Color(shadowConfig.color);
            ctx.shadowColor = `rgba(${shadowColor.r * 255}, ${shadowColor.g * 255}, ${shadowColor.b * 255}, ${shadowConfig.opacity})`;
            ctx.shadowBlur = shadowConfig.blur;
            ctx.shadowOffsetX = shadowConfig.x;
            ctx.shadowOffsetY = shadowConfig.y;

            ctx.fillStyle = config.col;
            ctx.fill();
            ctx.restore();

            // Content
            ctx.save();
            ctx.translate(x, y);

            // Clip
            ctx.beginPath();
            if (isCircle) {
                ctx.arc(realW / 2, realH / 2, effectiveRadius, 0, Math.PI * 2);
            } else {
                roundRect(ctx, 0, 0, realW, realH, effectiveRadius);
            }
            ctx.clip();

            if (customImage) {
                ctx.drawImage(customImage, 0, 0, realW, realH);
            } else {
                // Background
                ctx.fillStyle = config.col;
                ctx.fillRect(0, 0, realW, realH);

                // Elementos visuais baseados no tipo
                ctx.fillStyle = "rgba(255,255,255,0.1)";

                switch (config.type) {
                    case 'sidebar':
                        for (let i = 0; i < 8; i++) {
                            ctx.fillRect(30, 50 + i * 80, realW - 60, 40);
                        }
                        break;

                    case 'header':
                        ctx.fillRect(40, 40, 300, 40);
                        ctx.beginPath();
                        ctx.arc(realW - 60, 60, 25, 0, Math.PI * 2);
                        ctx.fill();
                        break;

                    case 'chart':
                        ctx.strokeStyle = "#10b981";
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(40, realH - 60);
                        for (let i = 1; i < 12; i++) {
                            ctx.lineTo(40 + i * (realW / 12), realH - 60 - Math.random() * 120);
                        }
                        ctx.stroke();
                        break;

                    case 'cards':
                        ctx.fillStyle = "#fff";
                        ctx.font = 'bold 70px Inter, Arial';
                        ctx.fillText("84k", 40, 100);
                        ctx.fillStyle = "#10b981";
                        ctx.font = '32px Inter, Arial';
                        ctx.fillText("+12%", 40, 160);
                        break;

                    case 'notification':
                        ctx.fillStyle = "#fff";
                        ctx.font = 'bold 24px Inter, Arial';
                        ctx.fillText("Atualização do Sistema", 20, 45);
                        ctx.fillStyle = "rgba(255,255,255,0.7)";
                        ctx.font = '18px Inter, Arial';
                        ctx.fillText("Nova transação processada", 20, 75);
                        break;

                    case 'circle-btn':
                        ctx.fillStyle = "#fff";
                        ctx.font = 'bold 70px Inter, Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText("+", realW / 2, realH / 2);
                        break;

                    case 'metric':
                        ctx.fillStyle = "#fff";
                        ctx.font = 'bold 80px Inter, Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText("$2.4M", realW / 2, 120);
                        ctx.font = '24px Inter, Arial';
                        ctx.fillStyle = "rgba(255,255,255,0.7)";
                        ctx.fillText("Volume Total", realW / 2, 190);
                        break;

                    default:
                        // Table
                        for (let i = 0; i < 5; i++) {
                            ctx.fillStyle = i % 2 === 0 ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.02)";
                            ctx.fillRect(20, 60 + i * 50, realW - 40, 35);
                        }
                }
            }

            ctx.restore();

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.anisotropy = 16;
            return texture;
        }

        function roundRect(ctx, x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
        }

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);

        // Fog
        scene.fog = new THREE.FogExp2(0x050508, 0.002);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 2, 140);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            powerPreference: "high-performance",
            alpha: false,
            stencil: false,
            depth: true
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = false;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x10b981, 0.5, 200);
        pointLight.position.set(0, 10, 20);
        scene.add(pointLight);

        // Particles
        const particles = createParticleSystem();
        scene.add(particles);

        // Main Group
        const stageGroup = new THREE.Group();
        stageGroup.rotation.x = 0.08;
        stageGroup.rotation.y = -0.2;
        stageGroup.scale.set(2.2, 2.2, 2.2);
        scene.add(stageGroup);

        // Layers
        const layers = [];

        layersConfig.forEach((conf, i) => {
            const geoW = (conf.w + CONFIG.canvasPadding * 2) / 50;
            const geoH = (conf.h + CONFIG.canvasPadding * 2) / 50;
            const geometry = new THREE.PlaneGeometry(geoW, geoH);

            const texture = createUIElement(conf, shadowConfig, i, renderConfig.borderRadius);

            const material = new THREE.MeshStandardMaterial({
                map: texture,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: conf.op,
                emissive: new THREE.Color(0x222222),
                emissiveIntensity: 0.2,
                roughness: 0.3,
                metalness: 0.1
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(conf.x, conf.y, conf.z);
            mesh.scale.set(conf.s, conf.s, conf.s);

            stageGroup.add(mesh);

            layers.push({
                id: i,
                mesh,
                config: conf,
                customImage: null
            });
        });

        // GUI removida a pedido do usuário

        // --- ANIMAÇÃO INICIAL ---
        function startAnimation() {
            layers.forEach((layer, i) => {
                const mesh = layer.mesh;
                mesh.material.opacity = 0;
                mesh.scale.set(0, 0, 0);

                gsap.to(mesh.scale, {
                    x: layer.config.s,
                    y: layer.config.s,
                    z: layer.config.s,
                    duration: 1.2,
                    delay: i * 0.08,
                    ease: "backOut(1.7)"
                });

                gsap.to(mesh.material, {
                    opacity: layer.config.op,
                    duration: 1,
                    delay: i * 0.08,
                    ease: "power2.inOut"
                });
            });

            // Particle animation
            gsap.to(particles.rotation, {
                y: Math.PI * 2,
                duration: 40,
                repeat: -1,
                ease: "none"
            });
        }

        // --- LOADING ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('fade-out');
                startAnimation();
            }, 1500);
        });

        // --- MOUSE INTERACTION ---
        const mouse = new THREE.Vector2();
        const targetRotation = new THREE.Vector2();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            targetRotation.x = mouse.y * 0.1;
            targetRotation.y = mouse.x * 0.1;
        });

        // --- BUTTON INTERACTIONS ---
        document.getElementById('discoverBtn').addEventListener('click', () => {
            gsap.to(camera.position, {
                z: 100,
                y: 5,
                duration: 2,
                ease: "power2.inOut",
                yoyo: true,
                repeat: 1
            });
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            gsap.to(stageGroup.scale, {
                x: 2.5,
                y: 2.5,
                z: 2.5,
                duration: 0.5,
                yoyo: true,
                repeat: 1,
                ease: "power2.inOut"
            });
        });

        // --- ANIMATION LOOP ---
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;

            // Smooth rotation
            stageGroup.rotation.x += (targetRotation.x - stageGroup.rotation.x) * 0.05;
            stageGroup.rotation.y += (targetRotation.y - stageGroup.rotation.y) * 0.05;

            // Auto rotação fixa em 0.5
            stageGroup.rotation.y += 0.001 * 0.5;

            // Particle animation
            particles.rotation.y += 0.0005;
            particles.rotation.x += 0.0002;

            renderer.render(scene, camera);
        }

        animate();

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- FILE UPLOAD ---
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        // Update first card layer as example
                        const layer = layers.find(l => l.config.type === 'cards');
                        if (layer) {
                            layer.customImage = img;
                            layer.mesh.material.map = createUIElement(
                                layer.config,
                                shadowConfig,
                                layer.id,
                                renderConfig.borderRadius,
                                img
                            );
                            layer.mesh.material.needsUpdate = true;
                        }
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Stats animation
        const stats = ['2.4M', '$1.2B', '50K+'];
        stats.forEach((value, i) => {
            const element = document.getElementById(['statTransactions', 'statVolume', 'statUsers'][i]);
            if (element) {
                gsap.fromTo(element,
                    { opacity: 0, y: 20 },
                    { opacity: 1, y: 0, duration: 1, delay: 1 + i * 0.2 }
                );
            }
        });
    </script>
</body>

</html>
