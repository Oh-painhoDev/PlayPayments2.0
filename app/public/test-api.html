<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MazorPay API Playground</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            color-scheme: dark;
            font-family: "Plus Jakarta Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #050505;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }
        .card {
            width: min(900px, 100%);
            background: #131313;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 32px;
            display: grid;
            gap: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
        }
        h1 {
            font-size: clamp(24px, 4vw, 32px);
            margin: 0;
        }
        .subtitle {
            color: #9ba0a5;
            margin-top: -16px;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #d2d5d9;
            margin-bottom: 6px;
            display: inline-block;
        }
        input, select, button, textarea {
            width: 100%;
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid #2b2b2b;
            background: #0b0b0b;
            color: #fff;
            font-size: 14px;
        }
        textarea {
            min-height: 160px;
            font-family: "JetBrains Mono", "Fira Code", monospace;
            line-height: 1.4;
        }
        button {
            background: linear-gradient(135deg, #21b3dd, #7c5dff);
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(124,93,255,0.35);
        }
        .grid {
            display: grid;
            gap: 18px;
        }
        @media (min-width: 640px) {
            .grid.two-cols {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        .badge {
            background: rgba(33,179,221,0.14);
            color: #21b3dd;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .address-editor {
            margin: 12px 0 24px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #0b0b0b;
        }
        .address-editor small {
            color: #9ba0a5;
        }
        .address-editor .address-actions {
            margin-top: 12px;
            display: grid;
            gap: 12px;
        }
        @media (min-width: 640px) {
            .address-editor .address-actions {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div>
            <div class="badge">MazorPay · API Gateway v1.1</div>
            <h1>API Playground</h1>
            <p class="subtitle">Teste rapidamente os endpoints locais. Por padrão usamos <code>http://localhost:8000</code>.</p>
        </div>
        <div class="grid two-cols">
            <div>
                <label for="baseUrl">Base URL</label>
                <input id="baseUrl" type="url" value="http://localhost:8000" placeholder="http://localhost:8000">
            </div>
            <div>
                <label for="route">Rota</label>
                <select id="route">
                    <option value="/health">GET /health</option>
                    <option value="/api/v1/transactions" data-method="POST">POST /api/v1/transactions</option>
                    <option value="/api/v1/transactions?per_page=5">GET /api/v1/transactions</option>
                    <option value="/api/v2/transactions" data-method="POST">POST /api/v2/transactions</option>
                    <option value="/api/v2/transactions?per_page=5">GET /api/v2/transactions</option>
                    <option value="/api/v1/customers">GET /api/v1/customers</option>
                    <option value="/api/v1/balance">GET /api/v1/balance</option>
                </select>
            </div>
        </div>
        <div class="grid two-cols">
            <div>
                <label for="publicKey">X-Public-Key</label>
                <input id="publicKey" type="text" placeholder="PB-MAZOR-..." autocomplete="off">
            </div>
            <div>
                <label for="privateKey">X-Private-Key</label>
                <input id="privateKey" type="text" placeholder="SK-MAZOR-..." autocomplete="off">
            </div>
        </div>
        <div class="grid two-cols">
            <div>
                <label for="method">Método</label>
                <select id="method">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                </select>
            </div>
            <div>
                <label for="contentType">Content-Type</label>
                <select id="contentType">
                    <option value="application/json">application/json</option>
                    <option value="application/x-www-form-urlencoded">application/x-www-form-urlencoded</option>
                </select>
            </div>
        </div>

        <div class="address-editor">
            <div>
                <label style="font-weight:600;display:block;margin-bottom:4px;">Endereço do Cliente</label>
                <small>Atualize os campos abaixo para montar o <code>customer.address</code> automaticamente.</small>
            </div>
            <div class="grid two-cols" style="margin-top:14px;">
                <div>
                    <label for="addrStreet">Rua</label>
                    <input id="addrStreet" type="text" placeholder="Rua das Flores">
                </div>
                <div>
                    <label for="addrNumber">Número</label>
                    <input id="addrNumber" type="text" placeholder="123">
                </div>
            </div>
            <div class="grid two-cols">
                <div>
                    <label for="addrComplement">Complemento</label>
                    <input id="addrComplement" type="text" placeholder="Apto 45">
                </div>
                <div>
                    <label for="addrNeighborhood">Bairro</label>
                    <input id="addrNeighborhood" type="text" placeholder="Centro">
                </div>
            </div>
            <div class="grid two-cols">
                <div>
                    <label for="addrCity">Cidade</label>
                    <input id="addrCity" type="text" placeholder="Rio de Janeiro">
                </div>
                <div>
                    <label for="addrState">Estado (UF)</label>
                    <input id="addrState" type="text" maxlength="2" placeholder="RJ">
                </div>
            </div>
            <div>
                <label for="addrZip">CEP</label>
                <input id="addrZip" type="text" placeholder="20040020">
            </div>
            <div class="address-actions">
                <button type="button" id="loadAddressFromBody">← Carregar do JSON</button>
                <button type="button" id="applyAddressToBody">Aplicar no Payload →</button>
            </div>
        </div>

        <div id="bodyWrapper" class="grid">
            <div>
                <label for="requestBody">Payload (JSON)</label>
                <textarea id="requestBody" spellcheck="false">{&#10;  "amount": 15000,&#10;  "payment_method": "pix",&#10;  "sale_name": "Teste MazorPay",&#10;  "description": "PIX criado via playground",&#10;  "customer": {&#10;    "name": "João API",&#10:    "email": "joao@example.com",&#10;    "document": "09115751031",&#10;    "phone": "21999999999",&#10;    "address": {&#10;      "street": "Rua das Flores",&#10;      "number": "123",&#10;      "neighborhood": "Centro",&#10;      "city": "Rio de Janeiro",&#10;      "state": "RJ",&#10;      "zip_code": "20040020"&#10;    }&#10;  },&#10;  "items": [&#10;    {&#10;      "title": "Curso de Programação",&#10;      "price": 15000,&#10;      "quantity": 1&#10;    }&#10;  ],&#10;  "pix_expires_in_minutes": 30&#10;}</textarea>
            </div>
        </div>

        <button id="sendRequest">Disparar Request</button>
        <div>
            <label for="responseBox">Resposta</label>
            <textarea id="responseBox" readonly>Execute uma chamada para ver o JSON formatado aqui.</textarea>
        </div>
    </div>

    <script>
        const button = document.getElementById('sendRequest');
        const responseBox = document.getElementById('responseBox');
        const routeSelect = document.getElementById('route');
        const methodSelect = document.getElementById('method');
        const bodyWrapper = document.getElementById('bodyWrapper');
        const requestBodyInput = document.getElementById('requestBody');

        const routeConfig = {
            '/health': { method: 'GET', body: '' },
            '/api/v1/transactions': { method: 'POST' },
            '/api/v1/transactions?per_page=5': { method: 'GET' },
            '/api/v2/transactions': { method: 'POST' },
            '/api/v2/transactions?per_page=5': { method: 'GET' },
            '/api/v1/customers': { method: 'GET' },
            '/api/v1/balance': { method: 'GET' },
        };

        const defaultTransactionBody = requestBodyInput.value;

        routeSelect.addEventListener('change', () => {
            const value = routeSelect.value;
            const config = routeConfig[value.replace(/\?.*/, '')] || { method: 'GET' };
            methodSelect.value = config.method;
            if (config.method === 'GET') {
                bodyWrapper.style.display = 'none';
            } else {
                bodyWrapper.style.display = 'block';
                if (config.method === 'POST' && !requestBodyInput.value.trim()) {
                    requestBodyInput.value = defaultTransactionBody;
                }
            }
        });

        routeSelect.dispatchEvent(new Event('change'));

        button.addEventListener('click', async () => {
            const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '');
            const route = routeSelect.value;
            const method = methodSelect.value;
            const publicKey = document.getElementById('publicKey').value.trim();
            const privateKey = document.getElementById('privateKey').value.trim();
            const contentType = document.getElementById('contentType').value;
            const bodyText = requestBodyInput.value.trim();

            responseBox.value = '⏳ Chamando ' + method + ' ' + baseUrl + route + ' ...';

            const headers = {
                'Accept': 'application/json',
            };

            if (method === 'GET') {
                if (publicKey) {
                    headers['Authorization'] = `Bearer ${publicKey}`;
                }
            } else {
                if (publicKey) headers['X-Public-Key'] = publicKey;
                if (privateKey) headers['X-Private-Key'] = privateKey;
                if (privateKey) {
                    headers['Authorization'] = `Bearer ${privateKey}`;
                }
            }
            if (method !== 'GET') headers['Content-Type'] = contentType;

            const fetchOptions = {
                method,
                headers,
            };

            if (method !== 'GET' && bodyText) {
                fetchOptions.body = contentType === 'application/json' ? bodyText : new URLSearchParams(JSON.parse(bodyText));
            }

            try {
                const response = await fetch(baseUrl + route, fetchOptions);
                let data;
                try {
                    data = await response.clone().json();
                } catch (jsonError) {
                    data = await response.text();
                }

                responseBox.value = JSON.stringify({
                    status: response.status,
                    ok: response.ok,
                    body: data,
                }, null, 2);
            } catch (error) {
                responseBox.value = '❌ Erro: ' + error.message;
            }
        });

        const addressFields = {
            street: document.getElementById('addrStreet'),
            number: document.getElementById('addrNumber'),
            complement: document.getElementById('addrComplement'),
            neighborhood: document.getElementById('addrNeighborhood'),
            city: document.getElementById('addrCity'),
            state: document.getElementById('addrState'),
            zip_code: document.getElementById('addrZip'),
        };

        const loadAddressBtn = document.getElementById('loadAddressFromBody');
        const applyAddressBtn = document.getElementById('applyAddressToBody');

        const parsePayload = () => {
            try {
                return JSON.parse(requestBodyInput.value || '{}');
            } catch (error) {
                alert('Payload JSON inválido. Corrija antes de continuar.');
                throw error;
            }
        };

        const fillAddressInputs = (address = {}) => {
            Object.entries(addressFields).forEach(([key, input]) => {
                input.value = address[key] ?? '';
            });
        };

        loadAddressBtn.addEventListener('click', () => {
            try {
                const body = parsePayload();
                const address = body?.customer?.address ?? {};
                fillAddressInputs(address);
            } catch (error) {
                // alerta já exibido
            }
        });

        applyAddressBtn.addEventListener('click', () => {
            try {
                const body = parsePayload();
                body.customer = body.customer || {};
                body.customer.address = body.customer.address || {};

                Object.entries(addressFields).forEach(([key, input]) => {
                    const value = input.value.trim();
                    if (value) {
                        body.customer.address[key] = value;
                    } else {
                        delete body.customer.address[key];
                    }
                });

                requestBodyInput.value = JSON.stringify(body, null, 2);
                responseBox.value = '✅ Endereço aplicado ao payload.';
            } catch (error) {
                // alerta já exibido
            }
        });

        loadAddressBtn.click();
    </script>
</body>
</html>
